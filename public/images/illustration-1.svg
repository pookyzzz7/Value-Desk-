<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" role="img" aria-label="Model price versus market price over time">
  <rect width="520" height="420" rx="16" fill="#0E2A1F"/>
  <g font-family="ui-monospace, monospace" font-size="12" fill="#F4F3EC" fill-opacity="0.55">
    <text x="36" y="48">ODDS</text>
    <text x="440" y="392">TIME</text>
  </g>
  <!-- grid -->
  <g stroke="#F4F3EC" stroke-opacity="0.08">
    <line x1="36" y1="90" x2="484" y2="90"/>
    <line x1="36" y1="160" x2="484" y2="160"/>
    <line x1="36" y1="230" x2="484" y2="230"/>
    <line x1="36" y1="300" x2="484" y2="300"/>
    <line x1="36" y1="370" x2="484" y2="370"/>
  </g>
  <!-- our price: steady chalk line -->
  <path d="M 36 250 C 140 246, 300 242, 484 240" stroke="#F4F3EC" stroke-opacity="0.7" stroke-width="2.5" fill="none" stroke-dasharray="1 0"/>
  <!-- market price: drifting line that crosses above -->
  <path d="M 36 300 C 120 290, 180 250, 240 200 C 300 152, 380 140, 484 150" stroke="#C6E84B" stroke-width="3" fill="none"/>
  <!-- edge zone -->
  <path d="M 246 204 C 300 156, 380 143, 484 152 L 484 240 C 340 241, 280 244, 246 246 Z" fill="#C6E84B" fill-opacity="0.12"/>
  <circle cx="246" cy="204" r="6" fill="#C6E84B"/>
  <g font-family="ui-monospace, monospace" font-size="12">
    <text x="260" y="196" fill="#C6E84B">edge opens → pick sent</text>
    <text x="392" y="262" fill="#F4F3EC" fill-opacity="0.7">our price</text>
    <text x="392" y="132" fill="#C6E84B">market</text>
  </g>
</svg>
